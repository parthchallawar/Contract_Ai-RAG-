<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Keep the app (and the raw-file iframe preview) rendering on a light
         ground regardless of the OS/browser dark-mode preference, so the
         served .txt/.pdf preview never inverts to a black background. -->
    <meta name="color-scheme" content="light">
    <!-- Apply the theme before first paint so there's no light->dark flash.
         An explicit choice (from the header toggle) always wins; with no saved
         choice we follow the OS. The inferred value is deliberately NOT written
         back to localStorage — persisting it would freeze the app on whatever
         the OS happened to be at first load and stop it following OS changes. -->
    <script>
        (function () {
            var theme = null;
            try {
                var saved = localStorage.getItem('theme');
                if (saved === 'dark' || saved === 'light') theme = saved;
            } catch (e) {}
            if (!theme) {
                try {
                    theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                } catch (e) {
                    theme = 'light';
                }
            }
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <title>Contract Analysis</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%23C9A227' stroke-width='2'/%3E%3Cpath d='M10 16.5l4 4 8-9' fill='none' stroke='%232C4F7C' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <script src="/vendor/tailwind.js"></script>
    <link href="/vendor/material.css" rel="stylesheet"/>
    <link href="/vendor/inter.css" rel="stylesheet"/>
    <link href="/vendor/source-serif.css" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // Tokens resolve to CSS vars (RGB channels) so a single
                        // [data-theme] switch reskins the whole app, and Tailwind
                        // opacity modifiers (bg-primary/10) still work via <alpha-value>.
                        "ink": "rgb(var(--c-ink) / <alpha-value>)",
                        "primary": "rgb(var(--c-primary) / <alpha-value>)",
                        "primary-600": "rgb(var(--c-primary-600) / <alpha-value>)",
                        "brass": "rgb(var(--c-brass) / <alpha-value>)",
                        "paper": "rgb(var(--c-paper) / <alpha-value>)",
                        "surface": "rgb(var(--c-surface) / <alpha-value>)",
                        "surface2": "rgb(var(--c-surface2) / <alpha-value>)",
                        "muted": "rgb(var(--c-muted) / <alpha-value>)",
                        "line": "rgb(var(--c-line) / <alpha-value>)",
                        "line-strong": "rgb(var(--c-line-strong) / <alpha-value>)",
                        "critical": "rgb(var(--c-critical) / <alpha-value>)",
                        "caution": "rgb(var(--c-caution) / <alpha-value>)",
                        "clear": "rgb(var(--c-clear) / <alpha-value>)",
                    },
                    fontFamily: {
                        "display": ["Source Serif 4", "Georgia", "serif"],
                        "sans": ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        /* ===== Theme tokens (RGB channels) — light is the default on :root,
           dark overrides only the values under [data-theme="dark"]. ===== */
        :root {
            --c-ink: 22 34 46;
            --c-primary: 30 58 110;
            --c-primary-600: 42 76 134;
            --c-brass: 169 122 34;
            --c-brass-strong: 138 100 20;
            --c-paper: 244 246 249;
            --c-surface: 255 255 255;
            --c-surface2: 250 251 253;
            --c-muted: 86 100 114;
            --c-line: 227 232 239;
            --c-line-strong: 205 214 224;
            --c-critical: 179 54 43;
            --c-caution: 181 127 20;
            --c-clear: 46 125 91;
        }
        :root[data-theme="dark"] {
            --c-ink: 232 237 243;
            --c-primary: 122 165 227;
            --c-primary-600: 150 185 235;
            --c-brass: 217 179 100;
            --c-brass-strong: 217 179 100;
            --c-paper: 14 22 33;
            --c-surface: 22 32 45;
            --c-surface2: 17 27 38;
            --c-muted: 155 173 191;
            --c-line: 38 52 68;
            --c-line-strong: 52 70 90;
            --c-critical: 232 135 125;
            --c-caution: 224 180 92;
            --c-clear: 111 196 154;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        /* Redesign: nudge the whole rem-based type scale up ~6% so every view
           reads a touch larger without touching individual utilities. */
        html {
            font-size: 17px;
        }
        body {
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.003em;
        }
        /* The vendored Tailwind JIT build doesn't generate custom fontFamily
           utilities (theme.extend.fontFamily produces an empty rule) — define
           font-display directly so the serif headline treatment actually renders. */
        .font-display {
            font-family: "Source Serif 4", Georgia, serif;
            letter-spacing: -0.015em;
        }
        #app {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Tabular figures for every monetary amount / score so columns align. */
        .figures {
            font-variant-numeric: tabular-nums;
        }
        /* The grounding seal — a quiet brass hairline ring applied only where
           the backend actually verified something (see sealBadge in app.js). */
        .seal {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            border: 1px solid rgb(var(--c-brass));
            color: rgb(var(--c-brass-strong));
            background: rgb(var(--c-brass) / 0.12);
            border-radius: 9999px;
            padding: 0.12rem 0.5rem;
            font-size: 10px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .seal .material-symbols-outlined {
            font-size: 12px;
            line-height: 1;
        }
        /* Redesign: solid brass highlight with white text for a verified
           citation matched inside the extracted-text panel. box-decoration-break
           keeps the pill intact across line wraps. */
        mark#citation-highlight {
            background: #A97A22;
            color: #FFFFFF;
            padding: 0.05em 0.28em;
            border-radius: 3px;
            font-weight: 600;
            -webkit-box-decoration-break: clone;
            box-decoration-break: clone;
        }
        /* Redesign: severity accent rail for stat tiles — a quiet 4px stripe
           that encodes state (critical / caution / navy / clear) at a glance. */
        .stat-tile { position: relative; overflow: hidden; }
        .stat-tile::before {
            content: "";
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: #CDD6E0;
        }
        .stat-tile.sev-critical::before { background: #B3362B; }
        .stat-tile.sev-caution::before  { background: #B57F14; }
        .stat-tile.sev-navy::before     { background: #1E3A6E; }
        .stat-tile.sev-clear::before    { background: #2E7D5B; }
        .stat-tile > * { padding-left: 0.65rem; }
        .stat-tile { transition: box-shadow .18s ease, transform .18s ease; }
        .stat-tile:hover { box-shadow: 0 1px 2px rgba(22,34,46,.06), 0 10px 26px -14px rgba(22,34,46,.28); transform: translateY(-1px); }

        /* ============ Demo-fidelity component system (theme-aware) ============ */
        /* Header brand mark — navy rounded square holding the logo glyph (stays
           deep navy in both themes so the white/brass glyph always reads). */
        .brand-mark {
            width: 34px; height: 34px; border-radius: 9px;
            background: #1E3A6E; display: grid; place-items: center;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.12);
            color: #fff;
        }
        /* Header nav pills — active = accent text on an accent tint chip. */
        .nav-pill {
            padding: 8px 13px; border-radius: 8px; font-size: 13.5px; font-weight: 500;
            color: rgb(var(--c-muted)); transition: background .15s, color .15s; cursor: pointer;
        }
        .nav-pill:hover { color: rgb(var(--c-ink)); background: rgb(var(--c-surface2)); }
        .nav-pill.on { color: rgb(var(--c-primary)); background: rgb(var(--c-primary) / 0.13); font-weight: 600; }
        /* File pill on the right of the bar. */
        .file-pill {
            display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px;
            border: 1px solid rgb(var(--c-line)); border-radius: 999px; background: rgb(var(--c-surface2));
            font-size: 12.5px; font-weight: 500; color: rgb(var(--c-ink));
        }
        .live-dot { width: 7px; height: 7px; border-radius: 50%; background: rgb(var(--c-clear)); box-shadow: 0 0 0 3px rgb(var(--c-clear) / 0.2); }
        /* Theme toggle button. */
        .theme-toggle {
            width: 34px; height: 34px; border-radius: 8px; border: 1px solid rgb(var(--c-line));
            display: grid; place-items: center; color: rgb(var(--c-muted));
            background: rgb(var(--c-surface2)); cursor: pointer; transition: color .15s, border-color .15s;
        }
        .theme-toggle:hover { color: rgb(var(--c-ink)); border-color: rgb(var(--c-line-strong)); }

        /* Panel — the rounded, shadowed surface the demo used everywhere. */
        .panel { background: rgb(var(--c-surface)); border: 1px solid rgb(var(--c-line)); border-radius: 12px;
            box-shadow: 0 1px 2px rgba(22,34,46,.05), 0 8px 24px -14px rgba(22,34,46,.18); overflow: hidden; }
        .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 10px;
            padding: 13px 16px; border-bottom: 1px solid rgb(var(--c-line)); }
        .panel-head h3 { font-size: 13.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; margin: 0; }

        /* Risk / obligation rows — grouped ledger rows with a quote block. */
        .risk-group { font-size: 10px; font-weight: 800; letter-spacing: .09em; text-transform: uppercase;
            color: rgb(var(--c-muted)); margin: 6px 2px 9px; display: flex; align-items: center; gap: 8px; }
        .risk-group::after { content: ""; flex: 1; height: 1px; background: rgb(var(--c-line)); }
        .risk-row { display: flex; gap: 10px; padding: 11px; border: 1px solid rgb(var(--c-line)); border-radius: 9px;
            margin-bottom: 9px; background: rgb(var(--c-surface)); transition: box-shadow .15s ease; }
        .risk-row:hover { box-shadow: 0 6px 18px -12px rgba(22,34,46,.3); }
        .risk-row.crit { background: rgb(var(--c-critical) / 0.1); border-color: rgb(var(--c-critical) / 0.3); }
        .risk-row .rr-body { min-width: 0; flex: 1; }
        .risk-row .rr-title { font-size: 12.5px; font-weight: 700; display: flex; align-items: center; gap: 6px; color: rgb(var(--c-ink)); }
        .risk-row .rr-meta { font-size: 11.5px; color: rgb(var(--c-muted)); margin-top: 3px; line-height: 1.45; }
        .risk-row .rr-amt { font-variant-numeric: tabular-nums; font-weight: 800; font-size: 13px; white-space: nowrap; }
        .rr-amt.crit { color: rgb(var(--c-critical)); }
        .rr-amt.navy { color: rgb(var(--c-primary)); }
        /* Severity chips keep fixed dark-tone backgrounds so white text always
           reads, on either theme. */
        .sev-chip { font-size: 9.5px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase;
            padding: 1.5px 6px; border-radius: 4px; color: #fff; }
        .sev-chip.crit { background: #B3362B; }
        .sev-chip.caution { background: #B57F14; }
        .sev-chip.navy { background: #1E3A6E; }
        .quote-block { font-style: italic; color: rgb(var(--c-muted)); font-size: 11px; background: rgb(var(--c-surface2));
            border-left: 2px solid rgb(var(--c-brass)); padding: 6px 9px; border-radius: 0 5px 5px 0; margin-top: 6px;
            font-family: "Source Serif 4", Georgia, serif; }

        /* A quote that can be jumped to in the extracted-text panel. Applied on
           top of .quote-block or a view's own quote styling. */
        .quote-link { cursor: pointer; transition: background-color .15s ease, border-color .15s ease; }
        .quote-link:hover { background: rgb(var(--c-brass) / 0.12); border-color: rgb(var(--c-brass)); }
        .quote-link:focus-visible { outline: 2px solid rgb(var(--c-brass)); outline-offset: 2px; }

        /* Document frame — the "paper" wrapper around the real file. */
        .doc-frame { background: rgb(var(--c-surface)); border: 1px solid rgb(var(--c-line)); border-radius: 8px;
            box-shadow: 0 4px 18px -10px rgba(22,34,46,.22); overflow: hidden; }

        /* Dark-mode fixes for dual-role / fixed utilities the token swap can't
           reach: bg-ink is a dark fill (must stay dark so its white text shows),
           and solid bg-primary fills need a deeper navy than the light accent. */
        :root[data-theme="dark"] .bg-ink { background-color: #0C141D !important; }
        :root[data-theme="dark"] .bg-primary { background-color: #2E5488 !important; }
        :root[data-theme="dark"] .hover\:bg-primary\/90:hover { background-color: #35619B !important; }
        /* The real-file preview renders on white (color-scheme:light); give it a
           soft frame in dark mode so a white page doesn't sit on near-black. */
        :root[data-theme="dark"] .document-paper { box-shadow: 0 0 0 1px rgb(var(--c-line)), 0 8px 24px -12px rgba(0,0,0,.5); }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgb(var(--c-line-strong));
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgb(var(--c-muted));
        }
        .document-paper {
            box-shadow: 0 4px 6px -1px rgb(22 35 46 / 0.08), 0 2px 4px -2px rgb(22 35 46 / 0.08);
        }
        .loading-spinner {
            border: 3px solid rgb(var(--c-line));
            border-top: 3px solid rgb(var(--c-primary));
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out;
        }
        /* Respect users who ask for less motion — freeze the spinner/pulse/toast. */
        @media (prefers-reduced-motion: reduce) {
            .loading-spinner {
                animation: none;
            }
            .animate-fade-in-up {
                animation: none;
            }
            .animate-pulse {
                animation: none;
            }
        }
        /* Ensure full height for split views */
        .h-screen-minus-header {
            height: calc(100vh - 60px);
        }
        .h-screen-minus-header-footer {
            height: calc(100vh - 120px);
        }

        /* The printed report's quote blocks are plain evidence, not links. */
        .report-page .quote-block {
            margin-top: 0.35rem;
        }

        /* ===================== Print / PDF export =====================
           The app shell is a fixed-height, overflow-hidden flex layout, which
           would otherwise clip the report to a single page. Everything here
           exists to turn that shell back into a normal flowing document. */
        @media print {
            /* 1. Undo the app-shell viewport lock. Without this the printout is
                  exactly one page and the rest of the report is silently cut. */
            html, body, #app {
                height: auto !important;
                overflow: visible !important;
            }
            #print-report {
                overflow: visible !important;
                background: #fff !important;
            }

            /* 2. Force the light palette regardless of the active theme, so a
                  dark-mode user doesn't print white-on-white or black pages. */
            :root, :root[data-theme="dark"], :root[data-theme="light"] {
                --c-ink: 22 34 46;
                --c-primary: 30 58 110;
                --c-primary-600: 42 76 134;
                --c-brass: 169 122 34;
                --c-brass-strong: 138 100 20;
                --c-paper: 255 255 255;
                --c-surface: 255 255 255;
                --c-surface2: 255 255 255;
                --c-muted: 86 100 114;
                --c-line: 205 214 224;
                --c-line-strong: 176 189 203;
                --c-critical: 179 54 43;
                --c-caution: 181 127 20;
                --c-clear: 46 125 91;
            }
            body { background: #fff !important; }

            /* 3. Chrome (nav, toggles, buttons) never prints. */
            header, .no-print, .theme-toggle, .nav-pill { display: none !important; }

            /* 4. Flat paper — drop the on-screen card treatment. */
            .report-page {
                margin: 0 !important;
                padding: 0 !important;
                max-width: none !important;
                border: 0 !important;
                border-radius: 0 !important;
                box-shadow: none !important;
            }

            /* 5. Keep blocks intact across page breaks. */
            .report-section, .report-item, .quote-block { break-inside: avoid; }
            h1, h2 { break-after: avoid; }

            /* 6. Preserve the severity chips' fills, which browsers strip by default. */
            .sev-chip, .seal {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            @page { margin: 14mm; }
        }
    </style>
</head>
<body class="bg-paper text-ink min-h-screen">
    <div id="app"></div>

    <script src="/js/app.js"></script>
</body>
</html>
