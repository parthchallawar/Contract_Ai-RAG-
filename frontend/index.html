<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Keep the app (and the raw-file iframe preview) rendering on a light
         ground regardless of the OS/browser dark-mode preference, so the
         served .txt/.pdf preview never inverts to a black background. -->
    <meta name="color-scheme" content="light">
    <title>Contract Analysis</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%23C9A227' stroke-width='2'/%3E%3Cpath d='M10 16.5l4 4 8-9' fill='none' stroke='%232C4F7C' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <script src="/vendor/tailwind.js"></script>
    <link href="/vendor/material.css" rel="stylesheet"/>
    <link href="/vendor/inter.css" rel="stylesheet"/>
    <link href="/vendor/source-serif.css" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "ink": "#16222E",
                        "primary": "#1E3A6E",
                        "primary-600": "#2A4C86",
                        "brass": "#A97A22",
                        "paper": "#F4F6F9",
                        "surface": "#FFFFFF",
                        "surface2": "#FAFBFD",
                        "muted": "#566472",
                        "line": "#E3E8EF",
                        "line-strong": "#CDD6E0",
                        "critical": "#B3362B",
                        "caution": "#B57F14",
                        "clear": "#2E7D5B",
                    },
                    fontFamily: {
                        "display": ["Source Serif 4", "Georgia", "serif"],
                        "sans": ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        /* Redesign: nudge the whole rem-based type scale up ~6% so every view
           reads a touch larger without touching individual utilities. */
        html {
            font-size: 17px;
        }
        body {
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.003em;
        }
        /* The vendored Tailwind JIT build doesn't generate custom fontFamily
           utilities (theme.extend.fontFamily produces an empty rule) — define
           font-display directly so the serif headline treatment actually renders. */
        .font-display {
            font-family: "Source Serif 4", Georgia, serif;
            letter-spacing: -0.015em;
        }
        #app {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Tabular figures for every monetary amount / score so columns align. */
        .figures {
            font-variant-numeric: tabular-nums;
        }
        /* The grounding seal — a quiet brass hairline ring applied only where
           the backend actually verified something (see sealBadge in app.js). */
        .seal {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            border: 1px solid #A97A22;
            color: #8A6414;
            background: rgba(169, 122, 34, 0.1);
            border-radius: 9999px;
            padding: 0.12rem 0.5rem;
            font-size: 10px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .seal .material-symbols-outlined {
            font-size: 12px;
            line-height: 1;
        }
        /* Redesign: solid brass highlight with white text for a verified
           citation matched inside the extracted-text panel. box-decoration-break
           keeps the pill intact across line wraps. */
        mark#citation-highlight {
            background: #A97A22;
            color: #FFFFFF;
            padding: 0.05em 0.28em;
            border-radius: 3px;
            font-weight: 600;
            -webkit-box-decoration-break: clone;
            box-decoration-break: clone;
        }
        /* Redesign: severity accent rail for stat tiles — a quiet 4px stripe
           that encodes state (critical / caution / navy / clear) at a glance. */
        .stat-tile { position: relative; overflow: hidden; }
        .stat-tile::before {
            content: "";
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: #CDD6E0;
        }
        .stat-tile.sev-critical::before { background: #B3362B; }
        .stat-tile.sev-caution::before  { background: #B57F14; }
        .stat-tile.sev-navy::before     { background: #1E3A6E; }
        .stat-tile.sev-clear::before    { background: #2E7D5B; }
        .stat-tile > * { padding-left: 0.65rem; }
        .stat-tile { transition: box-shadow .18s ease, transform .18s ease; }
        .stat-tile:hover { box-shadow: 0 1px 2px rgba(22,34,46,.06), 0 10px 26px -14px rgba(22,34,46,.28); transform: translateY(-1px); }

        /* ============ Demo-fidelity component system ============ */
        /* Header brand mark — navy rounded square holding the logo glyph. */
        .brand-mark {
            width: 34px; height: 34px; border-radius: 9px;
            background: #1E3A6E; display: grid; place-items: center;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.12);
            color: #fff;
        }
        /* Header nav pills — active = navy text on a navy tint chip. */
        .nav-pill {
            padding: 8px 13px; border-radius: 8px; font-size: 13.5px; font-weight: 500;
            color: #566472; transition: background .15s, color .15s; cursor: pointer;
        }
        .nav-pill:hover { color: #16222E; background: #FAFBFD; }
        .nav-pill.on { color: #1E3A6E; background: #EAF0FA; font-weight: 600; }
        /* File pill on the right of the bar. */
        .file-pill {
            display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px;
            border: 1px solid #E3E8EF; border-radius: 999px; background: #FAFBFD;
            font-size: 12.5px; font-weight: 500;
        }
        .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #2E7D5B; box-shadow: 0 0 0 3px #E5F3EC; }

        /* Panel — the rounded, shadowed surface the demo used everywhere. */
        .panel { background: #fff; border: 1px solid #E3E8EF; border-radius: 12px;
            box-shadow: 0 1px 2px rgba(22,34,46,.05), 0 8px 24px -14px rgba(22,34,46,.18); overflow: hidden; }
        .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 10px;
            padding: 13px 16px; border-bottom: 1px solid #E3E8EF; }
        .panel-head h3 { font-size: 13.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; margin: 0; }

        /* Risk / obligation rows — grouped ledger rows with a quote block. */
        .risk-group { font-size: 10px; font-weight: 800; letter-spacing: .09em; text-transform: uppercase;
            color: #8A98A6; margin: 6px 2px 9px; display: flex; align-items: center; gap: 8px; }
        .risk-group::after { content: ""; flex: 1; height: 1px; background: #E3E8EF; }
        .risk-row { display: flex; gap: 10px; padding: 11px; border: 1px solid #E3E8EF; border-radius: 9px;
            margin-bottom: 9px; background: #fff; transition: box-shadow .15s ease; }
        .risk-row:hover { box-shadow: 0 6px 18px -12px rgba(22,34,46,.3); }
        .risk-row.crit { background: #FBEBE9; border-color: rgba(179,54,43,.24); }
        .risk-row .rr-body { min-width: 0; flex: 1; }
        .risk-row .rr-title { font-size: 12.5px; font-weight: 700; display: flex; align-items: center; gap: 6px; color: #16222E; }
        .risk-row .rr-meta { font-size: 11.5px; color: #566472; margin-top: 3px; line-height: 1.45; }
        .risk-row .rr-amt { font-variant-numeric: tabular-nums; font-weight: 800; font-size: 13px; white-space: nowrap; }
        .rr-amt.crit { color: #B3362B; }
        .rr-amt.navy { color: #1E3A6E; }
        .sev-chip { font-size: 9.5px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase;
            padding: 1.5px 6px; border-radius: 4px; color: #fff; }
        .sev-chip.crit { background: #B3362B; }
        .sev-chip.caution { background: #B57F14; }
        .sev-chip.navy { background: #1E3A6E; }
        .quote-block { font-style: italic; color: #566472; font-size: 11px; background: #FAFBFD;
            border-left: 2px solid #A97A22; padding: 6px 9px; border-radius: 0 5px 5px 0; margin-top: 6px;
            font-family: "Source Serif 4", Georgia, serif; }

        /* Document frame — the "paper" wrapper around the real file. */
        .doc-frame { background: #fff; border: 1px solid #E3E8EF; border-radius: 8px;
            box-shadow: 0 4px 18px -10px rgba(22,34,46,.22); overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #DFE5EC;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #5B6B7C;
        }
        .document-paper {
            box-shadow: 0 4px 6px -1px rgb(22 35 46 / 0.08), 0 2px 4px -2px rgb(22 35 46 / 0.08);
        }
        .loading-spinner {
            border: 3px solid #DFE5EC;
            border-top: 3px solid #2C4F7C;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out;
        }
        /* Respect users who ask for less motion — freeze the spinner/pulse/toast. */
        @media (prefers-reduced-motion: reduce) {
            .loading-spinner {
                animation: none;
            }
            .animate-fade-in-up {
                animation: none;
            }
            .animate-pulse {
                animation: none;
            }
        }
        /* Ensure full height for split views */
        .h-screen-minus-header {
            height: calc(100vh - 60px);
        }
        .h-screen-minus-header-footer {
            height: calc(100vh - 120px);
        }
    </style>
</head>
<body class="bg-paper text-ink min-h-screen">
    <div id="app"></div>

    <script src="/js/app.js"></script>
</body>
</html>
