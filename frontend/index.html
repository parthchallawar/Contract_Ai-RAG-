<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract Analysis</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%23C9A227' stroke-width='2'/%3E%3Cpath d='M10 16.5l4 4 8-9' fill='none' stroke='%232C4F7C' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <script src="/vendor/tailwind.js"></script>
    <link href="/vendor/material.css" rel="stylesheet"/>
    <link href="/vendor/inter.css" rel="stylesheet"/>
    <link href="/vendor/source-serif.css" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "ink": "#16232E",
                        "primary": "#2C4F7C",
                        "brass": "#C9A227",
                        "paper": "#F6F7F9",
                        "surface": "#FFFFFF",
                        "muted": "#5B6B7C",
                        "line": "#DFE5EC",
                    },
                    fontFamily: {
                        "display": ["Source Serif 4", "Georgia", "serif"],
                        "sans": ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        /* The vendored Tailwind JIT build doesn't generate custom fontFamily
           utilities (theme.extend.fontFamily produces an empty rule) — define
           font-display directly so the serif headline treatment actually renders. */
        .font-display {
            font-family: "Source Serif 4", Georgia, serif;
        }
        #app {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Tabular figures for every monetary amount / score so columns align. */
        .figures {
            font-variant-numeric: tabular-nums;
        }
        /* The grounding seal — a quiet brass hairline ring applied only where
           the backend actually verified something (see sealBadge in app.js). */
        .seal {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            border: 1px solid #C9A227;
            color: #8F6B0F;
            background: rgba(201, 162, 39, 0.1);
            border-radius: 9999px;
            padding: 0.1rem 0.45rem;
            font-size: 10px;
            font-weight: 600;
            line-height: 1.2;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }
        .seal .material-symbols-outlined {
            font-size: 12px;
            line-height: 1;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #DFE5EC;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #5B6B7C;
        }
        .document-paper {
            box-shadow: 0 4px 6px -1px rgb(22 35 46 / 0.08), 0 2px 4px -2px rgb(22 35 46 / 0.08);
        }
        .loading-spinner {
            border: 3px solid #DFE5EC;
            border-top: 3px solid #2C4F7C;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out;
        }
        /* Respect users who ask for less motion — freeze the spinner/pulse/toast. */
        @media (prefers-reduced-motion: reduce) {
            .loading-spinner {
                animation: none;
            }
            .animate-fade-in-up {
                animation: none;
            }
            .animate-pulse {
                animation: none;
            }
        }
        /* Ensure full height for split views */
        .h-screen-minus-header {
            height: calc(100vh - 60px);
        }
        .h-screen-minus-header-footer {
            height: calc(100vh - 120px);
        }
    </style>
</head>
<body class="bg-paper text-ink min-h-screen">
    <div id="app"></div>

    <script src="/js/app.js"></script>
</body>
</html>
